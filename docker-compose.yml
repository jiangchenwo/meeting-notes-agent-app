services:
  backend:
    # Built locally by default; set BACKEND_IMAGE to a registry ref to pull a prebuilt image.
    image: ${BACKEND_IMAGE:-meeting-notes-agent-backend:latest}
    build:
      context: ./backend
    # ASR (transcription+diarization) and LM Studio connection settings are
    # configured at runtime from the frontend Settings page and persisted to
    # the app-data volume (CONFIG_DIR=/data, set in the backend image).
    extra_hosts:
      - "host.docker.internal:host-gateway"   # required on Linux, harmless on macOS/Windows
    volumes:
      # One volume, split into subdirs by the backend: db/ (notes.db + WAL),
      # uploads/ (audio), config/ (LM Studio + ASR settings JSON).
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-meeting-notes-agent-frontend:latest}
    build:
      context: ./frontend
    ports:
      - "8080:80"                  # open http://localhost:8080
    depends_on:
      - backend

volumes:
  app-data:
